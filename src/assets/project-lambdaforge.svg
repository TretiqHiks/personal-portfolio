<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="terminalBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" stroke-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Background lambda glyph (large, faded) -->
  <text x="580" y="420" font-family="Georgia, serif" font-size="380" fill="#f97316" fill-opacity="0.04" font-weight="bold">λ</text>

  <!-- Terminal window -->
  <rect x="60" y="70" width="530" height="360" rx="10" fill="url(#terminalBg)" stroke="#30363d" stroke-width="1.5"/>

  <!-- Terminal title bar -->
  <rect x="60" y="70" width="530" height="36" rx="10" fill="#21262d"/>
  <rect x="60" y="88" width="530" height="18" fill="#21262d"/>

  <!-- Traffic lights -->
  <circle cx="90" cy="88" r="7" fill="#ff5f57"/>
  <circle cx="114" cy="88" r="7" fill="#ffbd2e"/>
  <circle cx="138" cy="88" r="7" fill="#28c840"/>

  <!-- Terminal title -->
  <text x="295" y="93" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">lambdaforge — bash</text>

  <!-- Terminal content -->
  <!-- Line 1: prompt + generate command -->
  <text x="84" y="144" font-family="'Courier New', monospace" font-size="13.5" fill="#8b949e">$</text>
  <text x="98" y="144" font-family="'Courier New', monospace" font-size="13.5" fill="#f0f6fc">lambdaforge generate --trigger </text>
  <text x="390" y="144" font-family="'Courier New', monospace" font-size="13.5" fill="#79c0ff">apigateway</text>

  <!-- Line 2: output -->
  <text x="84" y="168" font-family="'Courier New', monospace" font-size="13.5" fill="#3fb950">Event written to event.json</text>

  <!-- Line 3: blank -->

  <!-- Line 4: prompt + invoke command -->
  <text x="84" y="204" font-family="'Courier New', monospace" font-size="13.5" fill="#8b949e">$</text>
  <text x="98" y="204" font-family="'Courier New', monospace" font-size="13.5" fill="#f0f6fc">lambdaforge invoke --handler </text>
  <text x="368" y="204" font-family="'Courier New', monospace" font-size="13.5" fill="#79c0ff">src/handler.py::lambda_handler</text>
  <text x="84" y="222" font-family="'Courier New', monospace" font-size="13.5" fill="#f0f6fc">  --mock </text>
  <text x="157" y="222" font-family="'Courier New', monospace" font-size="13.5" fill="#79c0ff">dynamodb,s3</text>

  <!-- Divider line -->
  <line x1="84" y1="238" x2="576" y2="238" stroke="#30363d" stroke-width="1"/>

  <!-- Output block -->
  <text x="84" y="258" font-family="'Courier New', monospace" font-size="13" fill="#3fb950">✓</text>
  <text x="102" y="258" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Handler: </text>
  <text x="175" y="258" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">src/handler.py::lambda_handler</text>

  <text x="84" y="276" font-family="'Courier New', monospace" font-size="13" fill="#3fb950">✓</text>
  <text x="102" y="276" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Event:   </text>
  <text x="175" y="276" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">event.json</text>

  <text x="84" y="294" font-family="'Courier New', monospace" font-size="13" fill="#3fb950">✓</text>
  <text x="102" y="294" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Mocks:   </text>
  <text x="175" y="294" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">dynamodb, s3</text>

  <!-- Result divider -->
  <line x1="84" y1="308" x2="576" y2="308" stroke="#30363d" stroke-width="1"/>
  <text x="84" y="326" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Return value:</text>

  <!-- JSON output -->
  <text x="84" y="346" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">{"</text>
  <text x="107" y="346" font-family="'Courier New', monospace" font-size="13" fill="#79c0ff">statusCode</text>
  <text x="186" y="346" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">": </text>
  <text x="204" y="346" font-family="'Courier New', monospace" font-size="13" fill="#f2cc60">200</text>
  <text x="228" y="346" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">, "</text>
  <text x="252" y="346" font-family="'Courier New', monospace" font-size="13" fill="#79c0ff">body</text>
  <text x="283" y="346" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">": "</text>
  <text x="308" y="346" font-family="'Courier New', monospace" font-size="13" fill="#a5d6ff">ok</text>
  <text x="327" y="346" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">"}</text>

  <!-- Duration -->
  <line x1="84" y1="362" x2="576" y2="362" stroke="#30363d" stroke-width="1"/>
  <text x="84" y="380" font-family="'Courier New', monospace" font-size="13" fill="#8b949e">Duration: </text>
  <text x="164" y="380" font-family="'Courier New', monospace" font-size="13" fill="#f0f6fc">38ms</text>

  <!-- Cursor -->
  <text x="84" y="408" font-family="'Courier New', monospace" font-size="13.5" fill="#8b949e">$</text>
  <rect x="98" y="395" width="9" height="16" fill="#f97316" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Right panel: badge area -->
  <!-- Lambda badge -->
  <rect x="620" y="90" width="130" height="50" rx="8" fill="#1c2128" stroke="#f97316" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="656" y="121" font-family="Georgia, serif" font-size="30" fill="#f97316" filter="url(#glow)" text-anchor="middle">λ</text>
  <text x="695" y="121" font-family="'Courier New', monospace" font-size="12" fill="#8b949e">forge</text>

  <!-- Tech pills -->
  <rect x="622" y="160" width="65" height="24" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="654" y="177" font-family="monospace" font-size="11" fill="#60a5fa" text-anchor="middle">Python</text>

  <rect x="697" y="160" width="50" height="24" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="722" y="177" font-family="monospace" font-size="11" fill="#34d399" text-anchor="middle">CLI</text>

  <rect x="622" y="194" width="55" height="24" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="649" y="211" font-family="monospace" font-size="11" fill="#f97316" text-anchor="middle">moto</text>

  <rect x="687" y="194" width="60" height="24" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="717" y="211" font-family="monospace" font-size="11" fill="#a78bfa" text-anchor="middle">boto3</text>

  <rect x="622" y="228" width="55" height="24" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="649" y="245" font-family="monospace" font-size="11" fill="#fbbf24" text-anchor="middle">AWS</text>

  <rect x="687" y="228" width="60" height="24" rx="12" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="717" y="245" font-family="monospace" font-size="11" fill="#6ee7b7" text-anchor="middle">PyPI</text>

  <!-- Stats -->
  <rect x="615" y="275" width="155" height="100" rx="8" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="692" y="298" font-family="monospace" font-size="11" fill="#8b949e" text-anchor="middle">SUPPORTED TRIGGERS</text>
  <text x="630" y="318" font-family="monospace" font-size="11" fill="#3fb950">✓</text>
  <text x="644" y="318" font-family="monospace" font-size="11" fill="#f0f6fc">apigateway</text>
  <text x="630" y="334" font-family="monospace" font-size="11" fill="#3fb950">✓</text>
  <text x="644" y="334" font-family="monospace" font-size="11" fill="#f0f6fc">sqs / s3 / sns</text>
  <text x="630" y="350" font-family="monospace" font-size="11" fill="#3fb950">✓</text>
  <text x="644" y="350" font-family="monospace" font-size="11" fill="#f0f6fc">eventbridge</text>
  <text x="630" y="366" font-family="monospace" font-size="11" fill="#3fb950">✓</text>
  <text x="644" y="366" font-family="monospace" font-size="11" fill="#f0f6fc">no Docker needed</text>

  <!-- Bottom tag line -->
  <text x="400" y="468" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="2">pip install lambdaforge</text>
</svg>
