<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2128;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.15" stroke-opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Faded clock icon background -->
  <text x="550" y="420" font-family="Georgia, serif" font-size="320" fill="#6366f1" fill-opacity="0.035" font-weight="bold">⏱</text>

  <!-- Main dashboard panel -->
  <rect x="40" y="55" width="500" height="390" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="40" y="55" width="500" height="36" rx="10" fill="#21262d"/>
  <rect x="40" y="73" width="500" height="18" fill="#21262d"/>
  <circle cx="68" cy="73" r="7" fill="#ff5f57"/>
  <circle cx="92" cy="73" r="7" fill="#ffbd2e"/>
  <circle cx="116" cy="73" r="7" fill="#28c840"/>
  <text x="290" y="78" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">CronVault — Dashboard</text>

  <!-- Column headers -->
  <text x="60" y="118" font-family="monospace" font-size="11" fill="#8b949e">JOB NAME</text>
  <text x="240" y="118" font-family="monospace" font-size="11" fill="#8b949e">SCHEDULE</text>
  <text x="350" y="118" font-family="monospace" font-size="11" fill="#8b949e">LAST RUN</text>
  <text x="460" y="118" font-family="monospace" font-size="11" fill="#8b949e">STATUS</text>
  <line x1="52" y1="125" x2="528" y2="125" stroke="#30363d" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="52" y="130" width="476" height="36" rx="4" fill="#ffffff" fill-opacity="0.02"/>
  <text x="60" y="153" font-family="monospace" font-size="12" fill="#f0f6fc">db-backup</text>
  <text x="240" y="153" font-family="monospace" font-size="12" fill="#79c0ff">0 2 * * *</text>
  <text x="350" y="153" font-family="monospace" font-size="12" fill="#8b949e">2m 14s ago</text>
  <rect x="458" y="139" width="54" height="18" rx="9" fill="#166534" fill-opacity="0.6"/>
  <text x="485" y="152" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle">success</text>

  <!-- Row 2 -->
  <text x="60" y="189" font-family="monospace" font-size="12" fill="#f0f6fc">sync-reports</text>
  <text x="240" y="189" font-family="monospace" font-size="12" fill="#79c0ff">*/15 * * * *</text>
  <text x="350" y="189" font-family="monospace" font-size="12" fill="#8b949e">15s ago</text>
  <rect x="458" y="175" width="54" height="18" rx="9" fill="#991b1b" fill-opacity="0.6"/>
  <text x="485" y="188" font-family="monospace" font-size="11" fill="#f87171" text-anchor="middle">failure</text>

  <!-- Row 3 -->
  <rect x="52" y="202" width="476" height="36" rx="4" fill="#ffffff" fill-opacity="0.02"/>
  <text x="60" y="225" font-family="monospace" font-size="12" fill="#f0f6fc">cleanup-logs</text>
  <text x="240" y="225" font-family="monospace" font-size="12" fill="#79c0ff">0 0 * * 0</text>
  <text x="350" y="225" font-family="monospace" font-size="12" fill="#8b949e">6d ago</text>
  <rect x="458" y="211" width="54" height="18" rx="9" fill="#166534" fill-opacity="0.6"/>
  <text x="485" y="224" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle">success</text>

  <!-- Row 4 -->
  <text x="60" y="261" font-family="monospace" font-size="12" fill="#f0f6fc">send-digest</text>
  <text x="240" y="261" font-family="monospace" font-size="12" fill="#79c0ff">0 8 * * 1-5</text>
  <text x="350" y="261" font-family="monospace" font-size="12" fill="#8b949e">18h ago</text>
  <rect x="458" y="247" width="54" height="18" rx="9" fill="#166534" fill-opacity="0.6"/>
  <text x="485" y="260" font-family="monospace" font-size="11" fill="#4ade80" text-anchor="middle">success</text>

  <!-- Divider -->
  <line x1="52" y1="276" x2="528" y2="276" stroke="#30363d" stroke-width="1"/>

  <!-- Run history chart section -->
  <text x="60" y="300" font-family="monospace" font-size="11" fill="#8b949e">RUN HISTORY — sync-reports (last 7 runs)</text>

  <!-- Bar chart bars -->
  <rect x="60" y="340" width="22" height="60" rx="3" fill="#4ade80" fill-opacity="0.7"/>
  <rect x="92" y="352" width="22" height="48" rx="3" fill="#4ade80" fill-opacity="0.7"/>
  <rect x="124" y="330" width="22" height="70" rx="3" fill="#4ade80" fill-opacity="0.7"/>
  <rect x="156" y="358" width="22" height="42" rx="3" fill="#f87171" fill-opacity="0.8"/>
  <rect x="188" y="345" width="22" height="55" rx="3" fill="#4ade80" fill-opacity="0.7"/>
  <rect x="220" y="360" width="22" height="40" rx="3" fill="#4ade80" fill-opacity="0.7"/>
  <rect x="252" y="344" width="22" height="56" rx="3" fill="#f87171" fill-opacity="0.8"/>
  <line x1="52" y1="405" x2="300" y2="405" stroke="#30363d" stroke-width="1"/>

  <!-- Duration labels -->
  <text x="71" y="418" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">1.2s</text>
  <text x="103" y="418" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">0.9s</text>
  <text x="135" y="418" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">1.4s</text>
  <text x="167" y="418" font-family="monospace" font-size="9" fill="#f87171" text-anchor="middle">err</text>
  <text x="199" y="418" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">1.1s</text>
  <text x="231" y="418" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">0.8s</text>
  <text x="263" y="418" font-family="monospace" font-size="9" fill="#f87171" text-anchor="middle">err</text>

  <!-- Notification panel (right side) -->
  <rect x="556" y="55" width="210" height="390" rx="10" fill="url(#cardBg)" stroke="#30363d" stroke-width="1.5"/>
  <rect x="556" y="55" width="210" height="36" rx="10" fill="#21262d"/>
  <rect x="556" y="73" width="210" height="18" fill="#21262d"/>
  <text x="661" y="78" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle">Alerts</text>

  <!-- Alert item 1 -->
  <rect x="568" y="105" width="186" height="60" rx="6" fill="#1f1a24" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.5"/>
  <text x="580" y="122" font-family="monospace" font-size="10" fill="#a78bfa">⚠ FAILURE ALERT</text>
  <text x="580" y="138" font-family="monospace" font-size="10" fill="#f0f6fc">sync-reports</text>
  <text x="580" y="154" font-family="monospace" font-size="10" fill="#8b949e">threshold: 2 failures</text>

  <!-- Alert item 2 -->
  <rect x="568" y="176" width="186" height="60" rx="6" fill="#0f2318" stroke="#166534" stroke-width="1" stroke-opacity="0.5"/>
  <text x="580" y="193" font-family="monospace" font-size="10" fill="#4ade80">✓ RECOVERY</text>
  <text x="580" y="209" font-family="monospace" font-size="10" fill="#f0f6fc">db-backup</text>
  <text x="580" y="225" font-family="monospace" font-size="10" fill="#8b949e">back to success</text>

  <!-- Settings section -->
  <line x1="568" y1="252" x2="742" y2="252" stroke="#30363d" stroke-width="1"/>
  <text x="580" y="270" font-family="monospace" font-size="10" fill="#8b949e">NOTIFICATION SETTINGS</text>

  <text x="580" y="292" font-family="monospace" font-size="10" fill="#8b949e">Webhook</text>
  <rect x="716" y="281" width="30" height="16" rx="8" fill="#6366f1" fill-opacity="0.8"/>
  <circle cx="738" cy="289" r="6" fill="#ffffff"/>

  <text x="580" y="316" font-family="monospace" font-size="10" fill="#8b949e">Email (SMTP)</text>
  <rect x="716" y="305" width="30" height="16" rx="8" fill="#6366f1" fill-opacity="0.8"/>
  <circle cx="738" cy="313" r="6" fill="#ffffff"/>

  <text x="580" y="340" font-family="monospace" font-size="10" fill="#8b949e">Fail threshold</text>
  <text x="716" y="340" font-family="monospace" font-size="10" fill="#f0f6fc">2</text>

  <text x="580" y="360" font-family="monospace" font-size="10" fill="#8b949e">On recovery</text>
  <rect x="716" y="349" width="30" height="16" rx="8" fill="#6366f1" fill-opacity="0.8"/>
  <circle cx="738" cy="357" r="6" fill="#ffffff"/>

  <!-- Tech pills bottom -->
  <line x1="568" y1="380" x2="742" y2="380" stroke="#30363d" stroke-width="1"/>
  <rect x="568" y="390" width="58" height="20" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="597" y="404" font-family="monospace" font-size="10" fill="#60a5fa" text-anchor="middle">Next.js</text>
  <rect x="634" y="390" width="55" height="20" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="661" y="404" font-family="monospace" font-size="10" fill="#34d399" text-anchor="middle">FastAPI</text>
  <rect x="697" y="390" width="48" height="20" rx="10" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="721" y="404" font-family="monospace" font-size="10" fill="#f97316" text-anchor="middle">Python</text>

  <!-- Bottom tag line -->
  <text x="400" y="468" font-family="monospace" font-size="12" fill="#8b949e" text-anchor="middle" letter-spacing="2">self-hosted · cron · monitoring · notifications</text>
</svg>
